---
# ─── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: farmtrust

---
# ─── Secret ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: farmtrust-secrets
  namespace: farmtrust
type: Opaque
stringData:
  SECRET_KEY: "changeme-replace-with-real-secret-in-production"
  DATABASE_URL: "postgresql+asyncpg://farmtrust:farmtrust@postgres-svc:5432/farmtrust"
  REDIS_URL: "redis://redis-svc:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc:9092"

---
# ─── PostgreSQL ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: farmtrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb-ha:pg16-latest
          env:
            - name: POSTGRES_USER
              value: farmtrust
            - name: POSTGRES_PASSWORD
              value: farmtrust
            - name: POSTGRES_DB
              value: farmtrust
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "farmtrust"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: farmtrust
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: farmtrust
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi

---
# ─── Redis ────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: farmtrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: farmtrust
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ─── Backend API ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmtrust-api
  namespace: farmtrust
spec:
  replicas: 3
  selector:
    matchLabels:
      app: farmtrust-api
  template:
    metadata:
      labels:
        app: farmtrust-api
    spec:
      containers:
        - name: api
          image: farmtrust/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: farmtrust-secrets
          env:
            - name: ML_SERVICE_URL
              value: http://ml-service-svc:8001
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: farmtrust
spec:
  selector:
    app: farmtrust-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
# ─── ML Service ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: farmtrust
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml
          image: farmtrust/ml:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service-svc
  namespace: farmtrust
spec:
  selector:
    app: ml-service
  ports:
    - port: 8001
      targetPort: 8001

---
# ─── Web Dashboard ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmtrust-web
  namespace: farmtrust
spec:
  replicas: 2
  selector:
    matchLabels:
      app: farmtrust-web
  template:
    metadata:
      labels:
        app: farmtrust-web
    spec:
      containers:
        - name: web
          image: farmtrust/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.farmtrust.ai/api/v1
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: farmtrust
spec:
  selector:
    app: farmtrust-web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP

---
# ─── Ingress ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: farmtrust-ingress
  namespace: farmtrust
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  tls:
    - hosts:
        - farmtrust.ai
        - api.farmtrust.ai
      secretName: farmtrust-tls
  rules:
    - host: api.farmtrust.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 80
    - host: farmtrust.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-svc
                port:
                  number: 80

---
# ─── HorizontalPodAutoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: farmtrust
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: farmtrust-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
